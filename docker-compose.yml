version: '3.8'

services:
  backend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-yourusername}/rebar-cut-optimizer-be:latest
    container_name: rebar_backend
    restart: always
    ports:
      - "5000:5000"
    volumes:
      - sqlite_data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DATABASE_URL=file:/app/data/prod.db
      - JWT_SECRET=${JWT_SECRET:-changeme_in_production}

volumes:
  sqlite_data:
